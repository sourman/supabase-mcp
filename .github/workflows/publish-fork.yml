name: Publish fork preview

permissions:
  contents: read

on:
  push:
    branches:
      - feat/function-logs-nameres
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: jdx/mise-action@v3

      - run: pnpm install --ignore-scripts

      - run: pnpm build

      - run: pnpm exec pkg-pr-new publish --commentWithSha --pnpm './packages/mcp-utils' './packages/mcp-server-supabase'
