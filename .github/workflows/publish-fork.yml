name: Publish fork build

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - run: pnpm install --ignore-scripts

      - run: pnpm --filter @supabase/mcp-utils build
      - run: pnpm --filter @supabase/mcp-server-supabase build

      - name: Prepare standalone tarballs
        run: |
          # Pack mcp-utils
          cp -r packages/mcp-utils /tmp/mcp-utils-pkg
          # Resolve workspace:^ to the actual version in its package.json
          MCP_UTILS_VERSION=$(node -p "require('./packages/mcp-utils/package.json').version")
          # Pack mcp-server-supabase with resolved deps
          cp -r packages/mcp-server-supabase /tmp/mcp-server-pkg

          # Fix the workspace dependency to a file reference
          sed -i "s|\"@supabase/mcp-utils\": \"workspace:\\^\"|\"@supabase/mcp-utils\": \"file:../mcp-utils.tgz\"|" /tmp/mcp-server-pkg/package.json

          # Fix catalog: peerDeps to real versions
          sed -i 's|"@modelcontextprotocol/sdk": "catalog:"|"@modelcontextprotocol/sdk": "^1.25.2"|' /tmp/mcp-server-pkg/package.json
          sed -i 's|"zod": "catalog:"|"zod": "^3.25.0 || ^4.0.0"|' /tmp/mcp-server-pkg/package.json

          # Remove catalog: devDeps (not needed at runtime)
          sed -i '/"catalog:"$/d' /tmp/mcp-server-pkg/package.json

          # Pack both
          cd /tmp/mcp-utils-pkg && npm pack && cp *.tgz /tmp/mcp-utils.tgz
          cd /tmp/mcp-server-pkg && npm pack && cp *.tgz /tmp/mcp-server-supabase.tgz

          # Create a combined install tarball: install mcp-utils first, then mcp-server
          # so clients can do: npm install mcp-server-supabase.tgz mcp-utils.tgz
          cp /tmp/mcp-utils.tgz packages/
          cp /tmp/mcp-server-supabase.tgz packages/

      - name: Delete previous latest release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        run: |
          gh release create latest \
            packages/mcp-utils.tgz \
            packages/mcp-server-supabase.tgz \
            --title "Latest build" \
            --notes "Auto-built from commit ${{ github.sha }}" \
            --target main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
