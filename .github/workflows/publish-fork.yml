name: Publish fork build

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - run: pnpm install --ignore-scripts

      - run: pnpm --filter @supabase/mcp-utils build
      - run: pnpm --filter @supabase/mcp-server-supabase build

      - name: Prepare standalone tarballs
        run: |
          # Copy both packages to temp dirs
          cp -r packages/mcp-utils /tmp/mcp-utils-pkg
          cp -r packages/mcp-server-supabase /tmp/mcp-server-pkg

          # Rewrite mcp-server-supabase/package.json: resolve workspace/catalog deps
          node -e "
            const fs = require('fs');
            const p = '/tmp/mcp-server-pkg/package.json';
            const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
            pkg.dependencies['@supabase/mcp-utils'] = 'file:../mcp-utils.tgz';
            pkg.peerDependencies['@modelcontextprotocol/sdk'] = '^1.25.2';
            pkg.peerDependencies['zod'] = '^3.25.0 || ^4.0.0';
            pkg.devDependencies = {};
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2));
          "

          # Pack both
          cd /tmp/mcp-utils-pkg && npm pack && cp *.tgz /tmp/mcp-utils.tgz
          cd /tmp/mcp-server-pkg && npm pack && cp *.tgz /tmp/mcp-server-supabase.tgz

          cp /tmp/mcp-utils.tgz packages/
          cp /tmp/mcp-server-supabase.tgz packages/

      - name: Delete previous latest release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        run: |
          gh release create latest \
            packages/mcp-utils.tgz \
            packages/mcp-server-supabase.tgz \
            --title "Latest build" \
            --notes "Auto-built from commit ${{ github.sha }}" \
            --target main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
